name: deploy github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: install wasm-bindgen-cli
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '
            $0 == "[[package]]" { in_package = 0 }
            $0 == "name = \"wasm-bindgen\"" { in_package = 1 }
            in_package && $1 == "version" {
              gsub("\"", "", $3)
              print $3
              exit
            }
          ' Cargo.lock)"
          if [[ -z "${version}" ]]; then
            echo "failed to find wasm-bindgen version in Cargo.lock" >&2
            exit 1
          fi
          cargo install wasm-bindgen-cli --version "${version}" --locked

      - name: check bevy wasm target
        run: cargo check -p bevy_burn_autogaze --target wasm32-unknown-unknown --no-default-features --features web

      - name: build bevy wasm artifacts
        working-directory: crates/bevy_burn_autogaze
        run: npm run build:wasm

      - name: prepare pages artifact
        run: |
          touch crates/bevy_burn_autogaze/www/.nojekyll
          test -f crates/bevy_burn_autogaze/www/index.html
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze.js
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze_bg.wasm

      - name: deploy to github pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: crates/bevy_burn_autogaze/www
          branch: www
          clean: true
