name: deploy github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: setup nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/bevy_burn_autogaze/package-lock.json

      - name: build and test bevy wasm demo
        run: tools/check_bevy_wasm_demo.sh --browser

      - name: prepare pages artifact
        run: |
          touch crates/bevy_burn_autogaze/www/.nojekyll
          test -f crates/bevy_burn_autogaze/www/index.html
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze.js
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze_bg.wasm

      - name: configure github pages
        uses: actions/configure-pages@v6

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: crates/bevy_burn_autogaze/www

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v5
