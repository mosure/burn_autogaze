name: deploy github pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: setup nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: install wasm-bindgen-cli
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '
            $0 == "[[package]]" { in_package = 0 }
            $0 == "name = \"wasm-bindgen\"" { in_package = 1 }
            in_package && $1 == "version" {
              gsub("\"", "", $3)
              print $3
              exit
            }
          ' Cargo.lock)"
          if [[ -z "${version}" ]]; then
            echo "failed to find wasm-bindgen version in Cargo.lock" >&2
            exit 1
          fi
          cargo install wasm-bindgen-cli --version "${version}" --locked

      - name: check bevy wasm target
        run: cargo check -p bevy_burn_autogaze --target wasm32-unknown-unknown --no-default-features --features web

      - name: build bevy wasm artifacts
        working-directory: crates/bevy_burn_autogaze
        run: npm run build:wasm

      - name: install bevy browser test dependencies
        working-directory: crates/bevy_burn_autogaze
        run: npm ci

      - name: install playwright chromium
        working-directory: crates/bevy_burn_autogaze
        run: npx playwright install --with-deps chromium

      - name: browser smoke static source
        working-directory: crates/bevy_burn_autogaze
        run: npm run test:browser

      - name: prepare pages artifact
        run: |
          touch crates/bevy_burn_autogaze/www/.nojekyll
          test -f crates/bevy_burn_autogaze/www/index.html
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze.js
          test -f crates/bevy_burn_autogaze/www/out/bevy_burn_autogaze_bg.wasm

      - name: configure github pages
        uses: actions/configure-pages@v6

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: crates/bevy_burn_autogaze/www

      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v5
