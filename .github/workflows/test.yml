name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v5

      - name: setup nightly rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      - name: cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/bevy_burn_autogaze/package-lock.json

      - name: release readiness gate
        timeout-minutes: 75
        run: tools/check_release_readiness.sh --browser --no-browser-deps
