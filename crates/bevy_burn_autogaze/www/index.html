<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>bevy_burn_autogaze</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #050607;
      }

      #bevy {
        width: 100% !important;
        height: 100% !important;
        display: block;
        image-rendering: pixelated;
      }

      #webcam {
        display: none;
      }

      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 32px;
        height: 32px;
        margin: -16px 0 0 -16px;
        border: 2px solid #d7dde2;
        border-left-color: #00a884;
        border-radius: 50%;
        animation: rotate 900ms linear infinite;
      }

      @keyframes rotate {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div class="loading"></div>
    <div id="status" aria-live="polite" hidden>booting</div>
    <video id="webcam" autoplay muted playsinline></video>
    <canvas id="bevy"></canvas>
    <script type="module">
      import init, { frame_input } from "./out/bevy_burn_autogaze.js";

      const params = new URLSearchParams(window.location.search);
      const loading = document.querySelector(".loading");
      const status = document.getElementById("status");
      const video = document.getElementById("webcam");
      window.__autogazeFrameStats = {
        count: 0,
        firstFrameMs: null,
        lastFrameMs: null,
        lastWidth: 0,
        lastHeight: 0,
      };

      boot();

      async function boot() {
        try {
          setStatus("loading wasm");
          await init();
          loading.style.display = "none";

          if (usesStaticSource()) {
            await startStaticSource();
          } else {
            await startCameraSource();
          }
        } catch (error) {
          console.error(error);
          loading.style.display = "none";
          const message = error?.message || String(error);
          if (isWebGpuUnavailable(message)) {
            setStatus(`webgpu unavailable: ${message}`);
          } else {
            setStatus(`runtime error: ${message}`);
          }
        }
      }

      function setStatus(message) {
        status.textContent = message;
        status.dataset.state = message;
      }

      function usesStaticSource() {
        const source = params.get("source")?.toLowerCase();
        return (
          source === "static" ||
          source === "image" ||
          params.has("image-url") ||
          params.has("static-frame")
        );
      }

      function defaultSourceDimensions() {
        const mode = params.get("mode")?.toLowerCase() || "";
        const tiled =
          mode === "tiled" ||
          mode === "tile" ||
          mode === "tile-224" ||
          mode === "full-res" ||
          mode === "fullres" ||
          mode === "anyres";
        return tiled ? { width: 1280, height: 720 } : { width: 640, height: 360 };
      }

      async function startCameraSource() {
        try {
          const defaults = defaultSourceDimensions();
          const width = queryNumber(["camera-width", "inference-width", "width"], 64, 3840, defaults.width);
          const height = queryNumber(["camera-height", "inference-height", "height"], 64, 2160, defaults.height);
          const stream = await navigator.mediaDevices.getUserMedia({
            video: {
              width: { ideal: width },
              height: { ideal: height },
              frameRate: { ideal: 30, max: 30 },
            },
            audio: false,
          });
          video.srcObject = stream;
          await video.play();

          if ("MediaStreamTrackProcessor" in window) {
            const [track] = stream.getVideoTracks();
            const processor = new MediaStreamTrackProcessor(track);
            const reader = processor.readable.getReader();
            setStatus("camera source running");
            readVideoFrames(reader);
          } else {
            const capture = document.createElement("canvas");
            const context = capture.getContext("2d", { willReadFrequently: true });
            setStatus("camera source running");
            captureWithCanvas(capture, context);
          }
        } catch (error) {
          console.warn(error);
          await startStaticSource();
        }
      }

      async function startStaticSource() {
        const frame = await loadStaticFrame();
        const fps = clampNumber(params.get("static-fps"), 1, 60, 15);
        const frameInterval = 1000 / fps;
        let lastFrame = 0;
        setStatus("static source running");

        function pump(now) {
          if (now - lastFrame >= frameInterval) {
            submitFrame(frame.data, frame.width, frame.height);
            lastFrame = now;
          }
          requestAnimationFrame(pump);
        }

        requestAnimationFrame(pump);
      }

      async function loadStaticFrame() {
        const imageUrl = params.get("image-url");
        if (imageUrl) {
          return loadImageFrame(imageUrl);
        }

        const defaults = defaultSourceDimensions();
        const width = queryNumber(["static-width", "inference-width", "width"], 64, 3840, defaults.width);
        const height = queryNumber(["static-height", "inference-height", "height"], 64, 2160, defaults.height);
        return generatedFrame(width, height);
      }

      async function loadImageFrame(url) {
        const image = new Image();
        image.crossOrigin = "anonymous";
        image.decoding = "async";
        image.src = url;
        await image.decode();

        const canvas = document.createElement("canvas");
        canvas.width = image.naturalWidth || image.width;
        canvas.height = image.naturalHeight || image.height;
        const context = canvas.getContext("2d", { willReadFrequently: true });
        context.drawImage(image, 0, 0, canvas.width, canvas.height);
        const pixels = context.getImageData(0, 0, canvas.width, canvas.height);
        return {
          data: new Uint8Array(pixels.data),
          width: canvas.width,
          height: canvas.height,
        };
      }

      function generatedFrame(width, height) {
        const data = new Uint8Array(width * height * 4);
        for (let y = 0; y < height; y += 1) {
          for (let x = 0; x < width; x += 1) {
            const offset = (y * width + x) * 4;
            const checker = ((x >> 6) + (y >> 6)) & 1;
            data[offset] = Math.round((x / Math.max(1, width - 1)) * 220 + checker * 25);
            data[offset + 1] = Math.round((y / Math.max(1, height - 1)) * 220 + 20);
            data[offset + 2] = checker ? 230 : 90;
            data[offset + 3] = 255;
          }
        }
        return { data, width, height };
      }

      async function readVideoFrames(reader) {
        const { value: frame, done } = await reader.read();
        if (done) {
          return;
        }

        const format = "RGBA";
        const pixelBuffer = new Uint8Array(frame.allocationSize({ format }));
        try {
          await frame.copyTo(pixelBuffer, { format });
          submitFrame(pixelBuffer, frame.displayWidth, frame.displayHeight);
        } finally {
          frame.close();
        }
        requestAnimationFrame(() => readVideoFrames(reader));
      }

      function captureWithCanvas(canvas, context) {
        if (video.videoWidth > 0 && video.videoHeight > 0) {
          if (canvas.width !== video.videoWidth || canvas.height !== video.videoHeight) {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
          }
          context.drawImage(video, 0, 0, canvas.width, canvas.height);
          const image = context.getImageData(0, 0, canvas.width, canvas.height);
          submitFrame(new Uint8Array(image.data), canvas.width, canvas.height);
        }
        requestAnimationFrame(() => captureWithCanvas(canvas, context));
      }

      function submitFrame(data, width, height) {
        frame_input(data, width, height);
        const stats = window.__autogazeFrameStats;
        const now = performance.now();
        stats.count += 1;
        stats.firstFrameMs ??= now;
        stats.lastFrameMs = now;
        stats.lastWidth = width;
        stats.lastHeight = height;
      }

      function clampNumber(value, min, max, fallback) {
        const number = Number.parseInt(value, 10);
        if (!Number.isFinite(number)) {
          return fallback;
        }
        return Math.min(max, Math.max(min, number));
      }

      function queryNumber(names, min, max, fallback) {
        for (const name of names) {
          if (params.has(name)) {
            return clampNumber(params.get(name), min, max, fallback);
          }
        }
        return fallback;
      }

      function isWebGpuUnavailable(message) {
        const lower = message.toLowerCase();
        return lower.includes("webgpu") || lower.includes("adapter");
      }

      document.addEventListener("contextmenu", (event) => event.preventDefault());
    </script>
  </body>
</html>
