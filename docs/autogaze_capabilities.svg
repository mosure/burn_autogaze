<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="360" viewBox="0 0 1080 360" role="img" aria-labelledby="title desc">
  <title id="title">burn_autogaze visualization capabilities</title>
  <desc id="desc">diagram showing multi-scale token masks, interframe output updates, and gaze ratio metrics</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132018"/>
      <stop offset="0.46" stop-color="#273a2f"/>
      <stop offset="1" stop-color="#74856e"/>
    </linearGradient>
    <linearGradient id="delta" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15181d"/>
      <stop offset="1" stop-color="#202830"/>
    </linearGradient>
    <style>
      .bg { fill: #090a0c; }
      .panel { fill: #121417; stroke: #2b3138; stroke-width: 1.2; }
      .frame { fill: url(#frame); stroke: #44515b; stroke-width: 1; }
      .delta { fill: url(#delta); stroke: #44515b; stroke-width: 1; }
      .cell { fill: #ffffff; fill-opacity: 0.84; stroke: #ffffff; stroke-width: 1; shape-rendering: crispEdges; }
      .grid { fill: none; stroke: #ffffff; stroke-opacity: 0.22; stroke-width: 1; shape-rendering: crispEdges; }
      .text { fill: #f4f6f8; font-family: sans-serif; font-size: 18px; }
      .small { fill: #b9c2cc; font-family: sans-serif; font-size: 14px; }
      .tiny { fill: #94a1ad; font-family: sans-serif; font-size: 12px; }
      .mono { fill: #dbe7f0; font-family: monospace; font-size: 15px; }
      .accent { fill: #7bdff2; }
      .warn { fill: #ffd166; }
      .line { stroke: #7bdff2; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .meter-bg { fill: #242b32; }
      .meter-fill { fill: #7bdff2; }
      .meter-ema { fill: #ffd166; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="360"/>

  <g transform="translate(24 24)">
    <rect class="panel" width="320" height="312" rx="8"/>
    <text class="text" x="22" y="34">multi-scale mask</text>
    <text class="small" x="22" y="58">crisp token cells, nearest sampled</text>
    <rect class="frame" x="22" y="82" width="276" height="156" rx="3"/>

    <path d="M22 160H298M160 82V238" class="grid"/>
    <path d="M91 82V238M229 82V238M22 121H298M22 199H298" class="grid"/>
    <path d="M239.4 82V238M258.8 82V238M278.2 82V238M22 193.4H298M22 204.8H298M22 216.2H298M22 227.6H298" class="grid"/>

    <rect class="cell" x="22" y="82" width="138" height="78"/>
    <rect class="cell" x="160" y="121" width="69" height="39"/>
    <rect class="cell" x="219.7" y="126.6" width="39.4" height="22.3"/>
    <rect class="cell" x="258.8" y="204.8" width="19.7" height="11.2"/>

    <text class="mono" x="22" y="268">2x2 + 4x4 + 7x7 + 14x14</text>
    <text class="tiny" x="22" y="290">derived from scale / patch_size</text>
  </g>

  <g transform="translate(380 24)">
    <rect class="panel" width="320" height="312" rx="8"/>
    <text class="text" x="22" y="34">interframe output</text>
    <text class="small" x="22" y="58">only masked regions update between keyframes</text>

    <rect class="frame" x="22" y="82" width="86" height="58" rx="3"/>
    <text class="tiny" x="38" y="160">keyframe</text>
    <text class="mono" x="42" y="180">100%</text>

    <path class="line" d="M116 111H140"/>
    <rect class="delta" x="148" y="82" width="86" height="58" rx="3"/>
    <rect class="cell" x="166" y="96" width="24" height="18"/>
    <rect class="cell" x="201" y="118" width="12" height="8"/>
    <text class="tiny" x="172" y="160">delta</text>
    <text class="mono" x="172" y="180">7.1%</text>

    <path class="line" d="M242 111H266"/>
    <rect class="delta" x="22" y="205" width="86" height="58" rx="3"/>
    <rect class="cell" x="64" y="224" width="18" height="14"/>
    <text class="tiny" x="48" y="285">delta</text>
    <text class="mono" x="48" y="304">3.6%</text>

    <path class="line" d="M116 234H140"/>
    <rect class="frame" x="148" y="205" width="86" height="58" rx="3"/>
    <text class="tiny" x="164" y="285">keyframe</text>
    <text class="mono" x="168" y="304">100%</text>

    <text class="tiny" x="250" y="92">keyframe</text>
    <text class="tiny" x="250" y="110">duration</text>
    <text class="mono warn" x="250" y="132">N=30</text>
  </g>

  <g transform="translate(736 24)">
    <rect class="panel" width="320" height="312" rx="8"/>
    <text class="text" x="22" y="34">gaze ratio metric</text>
    <text class="small" x="22" y="58">updated pixels / full frame, plus EMA</text>

    <text class="mono" x="22" y="100">gaze: 7.1% ema 12.4%</text>
    <rect class="meter-bg" x="22" y="122" width="276" height="16" rx="8"/>
    <rect class="meter-fill" x="22" y="122" width="20" height="16" rx="8"/>
    <text class="tiny" x="22" y="160">current frame update ratio</text>

    <rect class="meter-bg" x="22" y="188" width="276" height="16" rx="8"/>
    <rect class="meter-ema" x="22" y="188" width="34" height="16" rx="8"/>
    <text class="tiny" x="22" y="226">EMA across processed frames</text>

    <text class="small" x="22" y="264">full-blend and keyframes count as 100%</text>
    <text class="small" x="22" y="288">interframe deltas count only masked cells</text>
  </g>
</svg>
